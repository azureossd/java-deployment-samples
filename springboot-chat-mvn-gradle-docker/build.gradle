/*
 * This file was generated by the Gradle 'init' task.
 */

plugins {
    id 'java'
    id 'maven-publish'
    id 'org.springframework.boot' version '4.0.6'
    id 'io.spring.dependency-management' version '1.1.7'
}

repositories {
    mavenLocal()
    maven {
        url = uri('https://repo.maven.apache.org/maven2/')
    }
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-websocket:4.0.6'
    implementation 'org.springframework.boot:spring-boot-starter-amqp:4.0.6'
    implementation 'org.springframework.boot:spring-boot-starter-reactor-netty:4.0.6'
    runtimeOnly 'org.springframework.boot:spring-boot-devtools:4.0.6'
    testImplementation 'org.springframework.boot:spring-boot-starter-test:4.0.6'
}

group = 'com.example'
version = '0.0.1-SNAPSHOT'
description = 'websocket-demo'
java.sourceCompatibility = JavaVersion.VERSION_1_8

publishing {
    publications {
        maven(MavenPublication) {
            from(components.java)
        }
    }
}
